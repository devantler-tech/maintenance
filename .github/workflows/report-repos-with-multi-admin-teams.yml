on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC
  workflow_dispatch:

name: Report Repos with Multi Admin Teams

concurrency:
  group: report-repos-with-multi-admin-teams
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  report-repos-with-multi-admin-teams:
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get GitHub App token
        id: get-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: devantler-tech

      - name: Generate report
        id: report
        env:
          GH_TOKEN: ${{ steps.get-token.outputs.token }}
        run: |
          bun run report:repos-with-multi-admin-teams

      - name: Upload report to issue
        uses: step-security/create-issue-from-file@7444673975a4ae46c089644f50930db91fc53e4f # v6.0.0
        with:
          title: "[report] Repos with Multiple Admin Teams"
          content-filepath: ${{ steps.report.outputs.report-path }}
          token: ${{ steps.get-token.outputs.token }}
