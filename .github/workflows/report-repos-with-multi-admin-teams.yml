on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC
  workflow_dispatch:

name: Report Repos with Multi Admin Teams

concurrency:
  group: report-repos-with-multi-admin-teams
  cancel-in-progress: true

jobs:
  report-repos-with-multi-admin-teams:
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get GitHub App token
        id: get-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: devantler-tech

      - name: Generate report
        id: report
        env:
          GH_TOKEN: ${{ steps.get-token.outputs.token }}
        run: |
          bun run report:repos-with-multi-admin-teams

      - name: Upload report to issue
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: "[report] Repos with Multiple Admin Teams"
          content-filepath: ${{ steps.report.outputs.report-path }}
          token: ${{ steps.get-token.outputs.token }}
