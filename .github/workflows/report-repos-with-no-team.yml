on:
  schedule:
    - cron: "0 9 * * 3" # Every Wednesday at 09:00 UTC
  workflow_dispatch:

name: Report Repos with No Team

concurrency:
  group: report-repos-with-no-team
  cancel-in-progress: true

jobs:
  report-repos-with-no-team:
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get GitHub App token
        id: get-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: devantler-tech

      - name: Generate report
        id: report
        env:
          GH_TOKEN: ${{ steps.get-token.outputs.token }}
        run: |
          bun run report:repos-with-no-team

      - name: Upload report to issue
        uses: peter-evans/create-issue-from-file@e8ef132d6df98ed982188e460ebb3b5d4ef3a9cd # v5.0.1
        with:
          title: "[report] Repos with No Team Assigned"
          content-filepath: ${{ steps.report.outputs.report-path }}
          token: ${{ steps.get-token.outputs.token }}
