on:
  schedule:
    - cron: "0 9 * * 3" # Every Wednesday at 09:00 UTC
  workflow_dispatch:

name: Report Repos with No Team

concurrency:
  group: report-repos-with-no-team
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  report-repos-with-no-team:
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get GitHub App token
        id: get-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: devantler-tech

      - name: Generate report
        id: report
        env:
          GH_TOKEN: ${{ steps.get-token.outputs.token }}
        run: |
          bun run report:repos-with-no-team

      - name: Manage report issue
        uses: devantler-tech/actions/upsert-issue@55e9a09c265e68c601e22c44be8b9ec8d817cabb # v3.2.1
        with:
          title: "[report] Repos with No Team Assigned"
          body-file: ${{ steps.report.outputs.report-path }}
          open: ${{ steps.report.outputs.has-violations }}
          close-comment: "✅ All violations have been resolved."
          github-token: ${{ steps.get-token.outputs.token }}
